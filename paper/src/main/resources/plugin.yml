name: LeafTreeGen
version: 0.1.0
main: net.leaf.treegen.paper.PaperLeafTreeGenPlugin
api-version: '1.21'
folia-supported: true
load: POSTWORLD
description: Multichannel tree generator (Paper platform).
commands:
  leaftree:
    description: Root command for LeafTreeGen.
    permission: leaftreegen.admin
permissions:
  leaftreegen.admin:
    description: Allows administrative access to LeafTreeGen.
    default: op
  leaftreegen.sapling:
    description: Allows planting special tree saplings.
    default: true
